   <g id="text_1">
    <text style="font-weight: 700; font-size: 18px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #15191f" x="35.760384" y="59.632051" transform="rotate(-0 35.760384 59.632051)">Support-gated selective recovery under controlled sensor corruption</text>
   </g>
   <g id="text_2">
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5e6673" x="35.760384" y="78.592863" transform="rotate(-0 35.760384 78.592863)">Endpoints and routing thresholds were frozen before test; the support gate was proposed afterward and audited retrospectively</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(52.050148 169.367795)">Controlled fault</text>
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(36.266398 182.245279)">reaches an available</text>
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(60.266359 195.122764)">sensor group</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #20242a" x="281.541312" y="142.972746" transform="rotate(-0 281.541312 142.972746)">Base model</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #20242a" x="281.541312" y="225.124671" transform="rotate(-0 281.541312 225.124671)">Recovery model</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(428.815024 162.929053)">Cross-fitted</text>
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(402.744165 175.806537)">conditional selector</text>
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(432.525571 188.684022)">+ post hoc</text>
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(405.913852 201.561506)">support-gate audit</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(586.345298 169.412717)">Retrospective audit:</text>
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(604.075064 182.290201)">fallback unless</text>
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(603.085884 195.167686)">support passes</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #20242a" x="783.305395" y="110.941643" transform="rotate(-0 783.305395 110.941643)">96.2%</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(742.657098 124.960112)">harmful transfers</text>
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(759.52027 132.584639)">prevented</text>
   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #20242a" x="783.305395" y="186.564539" transform="rotate(-0 783.305395 186.564539)">6.6%</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(734.929239 200.583008)">available corrections</text>
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(763.736223 208.207535)">retained</text>
   </g>
   <g id="text_12">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #20242a" x="889.965043" y="110.941643" transform="rotate(-0 889.965043 110.941643)">5/10</text>
   </g>
   <g id="text_13">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(864.144653 124.928081)">fitted pairs</text>
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(861.798043 132.552608)">passed gate</text>
   </g>
   <g id="text_14">
    <text style="font-weight: 700; font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #20242a" x="889.965043" y="186.564539" transform="rotate(-0 889.965043 186.564539)">2 passes</text>
   </g>
   <g id="text_15">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(855.392434 200.583008)">supported-pair</text>
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(858.220793 208.207535)">endpoint cost</text>
   </g>
   <g id="text_16">
    <text style="font-size: 9.7px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #353b44" x="35.760384" y="292.551264" transform="rotate(-0 35.760384 292.551264)">Analytical controls at 2:1: two-stage mean utility +37.8 per 10,000 (95% fitted-pair interval -2.7 to +78.3); not a deployment recommendation.</text>
   </g>
   <g id="text_17">
    <text style="font-weight: 700; font-size: 10.8px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(35.760384 309.964819)">Outcome: reproducible risk control for controlled corruption; natural-failure recovery</text>
    <text style="font-weight: 700; font-size: 10.8px; font-family: 'DejaVu Sans'; fill: #20242a" transform="translate(35.760384 322.142832)">and device-independent transfer remain unproven.</text>
   </g>

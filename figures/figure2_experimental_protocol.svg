   </g>
   <g id="text_2">
    <text style="font-size: 6.6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(104.197094 82.23305)">Batches 1--6</text>
    <text style="font-size: 6.6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(112.082547 89.213787)">training</text>
   </g>
   <g id="text_3">
    <text style="font-size: 6.3px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(191.473547 79.021105)">Batch 7</text>
    <text style="font-size: 6.3px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(182.543789 85.684536)">60% selection</text>
    <text style="font-size: 6.3px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(180.618352 92.347967)">40% calibration</text>
   </g>
   <g id="text_4">
    <text style="font-size: 6.6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(264.031984 82.271722)">Batches 8--10</text>
    <text style="font-size: 6.6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(266.415203 89.252459)">held-out test</text>
   </g>
   <g id="text_5">
    <text style="font-size: 6.2px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(347.280344 79.020809)">40% group-1 fault</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(347.971547 85.651128)">Gaussian scale 3</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(347.629094 92.299466)">20% missingness</text>
   </g>
   <g id="text_6">
    <text style="font-size: 6.1px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(442.384687 79.180939)">Fixed fault indices,</text>
    <text style="font-size: 6.1px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(434.926961 85.632833)">masks and noise across</text>
    <text style="font-size: 6.1px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(441.024102 92.084727)">methods and seeds</text>
   </g>
   <g id="text_7">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="260.0075" y="150.324802" transform="rotate(-0 260.0075 150.324802)">Temporal acquisition order over 36 months; no test batch enters training, checkpoint selection or calibration</text>
   </g>
   <g id="text_8">
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(25.873 223.292787)">Hydraulic rig</text>
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(29.603 230.136987)">2,205 raw</text>
    <text style="font-size: 6.4px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(27.651 236.928987)">60-s cycles</text>
   </g>
   <g id="text_9">
    <text style="font-size: 6.6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(104.925672 226.67105)">1,449 stable</text>
    <text style="font-size: 6.6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(113.736672 233.651787)">cycles</text>
   </g>
   <g id="text_10">
    <text style="font-size: 6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(179.308125 223.619825)">Guarded blocked</text>
    <text style="font-size: 6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(176.480625 230.0537)">main split; stratified</text>
    <text style="font-size: 6px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(189.151875 236.399825)">sensitivity</text>
   </g>
   <g id="text_11">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(268.678437 226.698669)">14 sensors</text>
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(259.284414 233.573637)">5 physical groups</text>
   </g>
   <g id="text_12">
    <text style="font-size: 6.2px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(343.151047 223.457356)">Pressure or vibration</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(343.664484 230.015019)">controlled corruption</text>
    <text style="font-size: 6.2px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(348.316422 236.663356)">on 40% of cycles</text>
   </g>
   <g id="text_13">
    <text style="font-size: 6.1px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(440.349766 223.618939)">Native cooler, valve,</text>
    <text style="font-size: 6.1px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(436.619234 230.070833)">pump and accumulator</text>
    <text style="font-size: 6.1px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif" transform="translate(446.618469 236.522727)">condition labels</text>
   </g>
   <g id="text_14">
    <text style="font-size: 6.5px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="260.0075" y="294.792762" transform="rotate(-0 260.0075 294.792762)">Physical component labels are native to the rig; sensor faults in both datasets remain controlled interventions</text>
   </g>
   <g id="text_15">
    <text style="font-size: 10px; font-family: 'Arial', 'DejaVu Sans', 'Liberation Sans', sans-serif; text-anchor: middle" x="260.8" y="14.479687" transform="rotate(-0 260.8 14.479687)">Experimental protocol, fixed interventions and evidence boundary</text>
   </g>
  </g>
